function ensureJobFields() {
  jobs.forEach(j => {
    if(typeof j.address === 'undefined') j.address = '';
    if(typeof j.customer === 'undefined') j.customer = '';
    if(typeof j.pm === 'undefined') j.pm = '';
    if(typeof j.startDate === 'undefined') j.startDate = '';
    if(typeof j.dateEntered === 'undefined') j.dateEntered = '';
    if(typeof j.durationDays === 'undefined') j.durationDays = '';
    if(typeof j.laborersNeeded === 'undefined') j.laborersNeeded = '';
    if(typeof j.operatorsNeeded === 'undefined') j.operatorsNeeded = '';
    if(typeof j.lead === 'undefined') j.lead = j.people && j.people.length ? j.people[0] : '';
    if(j.lead && Array.isArray(j.people)) j.people = j.people.filter(p => p !== j.lead);
    if(typeof j.leadPhone === 'undefined') j.leadPhone = PHONE_BY_PERSON[j.lead] || '';
    if(typeof j.lastEdited === 'undefined') j.lastEdited = '';
  });
}
function jobTitleLine(j) {
  const parts = [];
  if(j.name) parts.push(j.name);
  if(j.num) parts.push(j.num);
  if(j.address && j.address !== j.name) parts.push(j.address);
  let line = parts.join(' / ');
  const customerPm = [j.customer || '', j.pm || ''].filter(Boolean).join(' - ');
  if(customerPm) line += ` - ${customerPm}`;
  else if(j.gc) line += ` - ${j.gc}`;
  return line || 'Unnamed Job';
}
function parsePmFromGc(gc) {
  const text = String(gc || '');
  const m = text.match(/(?:^|[-\s])\b(JF|MB|RT|SM)\b/);
  return m ? m[1] : '';
}

}


function normalizeHeader(h) {
  return String(h || '')
    .toLowerCase()
    .replace(/[#\.]/g,'')
    .replace(/&/g,'and')
    .replace(/[^a-z0-9]+/g,' ')
    .trim();
}
function pickField(row, names) {
  for (const name of names) {
    const target = normalizeHeader(name);
    for (const key of Object.keys(row)) {
      if (normalizeHeader(key) === target) return row[key];
    }
  }
  // fallback contains match for messy headers
  for (const name of names) {
    const target = normalizeHeader(name);
    for (const key of Object.keys(row)) {
      const nk = normalizeHeader(key);
      if (nk.includes(target) || target.includes(nk)) return row[key];
    }
  }
  return '';
}
function parseDelimited(text) {
  text = String(text || '').replace(/^\uFEFF/, '').trim();
  if(!text) return [];
  const firstLine = text.split(/\r?\n/)[0] || '';
  // Excel copy/paste is tab-delimited. CSV is comma-delimited. Some exports use semicolon.
  const tabCount = (firstLine.match(/\t/g) || []).length;
  const commaCount = (firstLine.match(/,/g) || []).length;
  const semiCount = (firstLine.match(/;/g) || []).length;
  const delimiter = tabCount >= commaCount && tabCount >= semiCount && tabCount > 0 ? '\t' : (semiCount > commaCount ? ';' : ',');
  const rows = [];
  let row = [], cell = '', inQuotes = false;
  for (let i=0; i<text.length; i++) {
    const ch = text[i];
    const next = text[i+1];
    if(ch === '"') {
      if(inQuotes && next === '"') { cell += '"'; i++; }
      else inQuotes = !inQuotes;
    } else if(ch === delimiter && !inQuotes) {
      row.push(cell); cell = '';
    } else if((ch === '\n' || ch === '\r') && !inQuotes) {
      if(ch === '\r' && next === '\n') i++;
      row.push(cell); cell = '';
      if(row.some(v => String(v).trim() !== '')) rows.push(row);
      row = [];
    } else {
      cell += ch;
    }
  }
  row.push(cell);
  if(row.some(v => String(v).trim() !== '')) rows.push(row);
  if(rows.length < 2) return [];
  const headers = rows[0].map(h => String(h || '').trim());
  return rows.slice(1).map(values => {
    const obj = {};
    headers.forEach((h,i)=>obj[h]=String(values[i] || '').trim());
    return obj;
  });
}

function accountingRowToJob(row) {

function importAccountingRows(rows) {
  let added = 0, updated = 0, skippedDone = 0, skippedBlank = 0;
  rows.forEach(row => {
    const done = String(pickField(row, ['RET NOTES','Ret Notes','Return Notes','RET Note']) || '').trim().toLowerCase() === 'done';
    if(done) { skippedDone++; return; }
    const job = accountingRowToJob(row);
    if(!job) { skippedBlank++; return; }
    const idx = UPCOMING_LIST.findIndex(j => String(j.num || '').trim() && String(j.num || '').trim().toLowerCase() === String(job.num || '').trim().toLowerCase());
    if(idx >= 0) {
      const existing = UPCOMING_LIST[idx];
      // Accounting owns identity fields only. Do not overwrite scheduling fields.
      existing.name = job.name || existing.name;
      existing.num = job.num || existing.num;
      existing.customer = job.customer || existing.customer;
      existing.pm = job.pm || existing.pm;
      existing.address = job.address || existing.address;
      existing.source = 'Accounting Import';
      updated++;
    } else {
      UPCOMING_LIST.push(job);
      added++;
    }
  });
  return {added, updated, skippedDone, skippedBlank, total: rows.length};
}

function getPersonClass(name) {
  if (CLASS_BY_PERSON[name]) return CLASS_BY_PERSON[name];
  if (name.includes('(513)')) return 'operator';
  if (name.includes('(110)') || name.includes('(42)') || name.includes('(520)') || name.includes('(660)') || name.toLowerCase().includes('apprentice')) return 'laborer';
  return 'other';
}


function numberOrZero(value) {
  const n = parseInt(value, 10);
  return Number.isFinite(n) ? n : 0;
}
function addBusinessDays(startIso, businessDays) {
  if(!startIso || !businessDays) return '';
  const d = new Date(startIso + 'T00:00:00');
  if(isNaN(d.getTime())) return '';
  let remaining = Math.max(1, numberOrZero(businessDays)) - 1;
  while(remaining > 0) {
    d.setDate(d.getDate() + 1);
    const day = d.getDay();
    if(day !== 0 && day !== 6) remaining--;
  }
  return d.toISOString().slice(0,10);
}
function rangesOverlap(aStart, aEnd, bStart, bEnd) {
  if(!aStart || !aEnd || !bStart || !bEnd) return false;
  return aStart <= bEnd && bStart <= aEnd;
}
function getActiveManpowerCounts() {
  const activePeople = ALL_PEOPLE.filter(p => getPersonClass(p) !== 'other');
  return {
    laborers: activePeople.filter(p => getPersonClass(p) === 'laborer').length,
    operators: activePeople.filter(p => getPersonClass(p) === 'operator').length
  };
}
function getJobAssignedDemand(j) {
  const people = [];
  if(j.lead) people.push(j.lead);
  (j.people || []).forEach(p => people.push(p));
  const assignedLaborers = people.filter(p => getPersonClass(p) === 'laborer').length;
  const assignedOperators = people.filter(p => getPersonClass(p) === 'operator').length;
  return {
    laborers: Math.max(numberOrZero(j.laborersNeeded), assignedLaborers),
    operators: Math.max(numberOrZero(j.operatorsNeeded), assignedOperators)
  };
}
function jobRangeForForecast(j) {
  const start = j.startDate || '';
  const duration = numberOrZero(j.durationDays || 1) || 1;
  const end = start ? addBusinessDays(start, duration) : '';
  return {start, end};
}
function getForecastForJob(target, targetIndex) {
  const active = getActiveManpowerCounts();
  const targetRange = jobRangeForForecast(target);
  if(!targetRange.start || !targetRange.end) {
    return {level:'gray', icon:'⚪', label:'Date?', laborers:0, operators:0, activeLaborers:active.laborers, activeOperators:active.operators, note:'Add start date and duration to forecast manpower.'};
  }
  let laborers = 0;
  let operators = 0;

  // Forecast all jobs on the Job List whose date ranges overlap this job.
  UPCOMING_LIST.forEach((u, idx) => {
    const r = jobRangeForForecast(u);
    if(rangesOverlap(targetRange.start, targetRange.end, r.start, r.end)) {
      laborers += numberOrZero(u.laborersNeeded);
      operators += numberOrZero(u.operatorsNeeded);
    }
  });

  // Include current open Daily Schedule jobs. If a scheduled job is already represented
  // by the same job number in the Job List, do not double count it.
  const targetNums = new Set(UPCOMING_LIST.map(u => String(u.num || '').trim()).filter(Boolean));
  jobs.forEach(j => {
    if(!j.open) return;
    const num = String(j.num || '').trim();
    if(num && targetNums.has(num)) return;
    const r = jobRangeForForecast(j);
    const include = (r.start && r.end) ? rangesOverlap(targetRange.start, targetRange.end, r.start, r.end) : true;
    if(include) {
      const d = getJobAssignedDemand(j);
      laborers += d.laborers;
      operators += d.operators;
    }
  });

  const laborRemain = active.laborers - laborers;
  const opRemain = active.operators - operators;
  let level = 'green', icon = '🟢', label = 'OK';
  if(laborRemain < 0 || opRemain < 0) { level = 'red'; icon = '🔴'; label = 'Short'; }
  else if(laborRemain <= 2 || opRemain <= 1 || laborers >= active.laborers * 0.85 || operators >= active.operators * 0.85) { level = 'yellow'; icon = '🟡'; label = 'Tight'; }
  const note = `Forecast for ${targetRange.start} to ${targetRange.end}: need ${laborers}/${active.laborers} laborers and ${operators}/${active.operators} operators. Remaining: ${laborRemain} laborers, ${opRemain} operators.`;
  return {level, icon, label, laborers, operators, activeLaborers:active.laborers, activeOperators:active.operators, note};
}
function forecastPillHtml(job, index) {
  const f = getForecastForJob(job, index);
  const details = [

    `Active roster: ${f.activeLaborers} laborers / ${f.activeOperators} operators`,
    f.level === 'red' ? 'Status: SHORT - adjust start date, manpower, or scheduled jobs.' : (f.level === 'yellow' ? 'Status: TIGHT - manpower is limited for this window.' : (f.level === 'green' ? 'Status: OK - manpower looks available.' : 'Status: add dates/duration to forecast.'))

  return `<span class="forecast-pill forecast-${f.level}" title="${escAttr(details)}">${f.icon} ${f.label}</span>`;
}

function getConflicts() {
  const seen = {p:{}, e:{}};
  const conflicts = [];
  jobs.forEach(j => {
    if(!j.open) return;
    if(j.lead) {
      if(seen.p[j.lead]) conflicts.push({type:'person',name:j.lead,jobs:[seen.p[j.lead],j.name]});
      else seen.p[j.lead]=j.name;
    }
    j.people.forEach(p => { if(seen.p[p]) { conflicts.push({type:'person',name:p,jobs:[seen.p[p],j.name]}); } else { seen.p[p]=j.name; } });
    j.equip.forEach(e => { if(seen.e[e]) { conflicts.push({type:'equip',name:e,jobs:[seen.e[e],j.name]}); } else { seen.e[e]=j.name; } });
  });
  return conflicts;
}

function onDropLead(e, jid) {
  e.preventDefault();
  e.currentTarget.classList.remove('drag-over');
  const target = jobs.find(x=>x.id===jid);
  if(!target || !target.open) return;
  const personItems = (dragItems.length ? dragItems : selectedResources).filter(item => item.type === 'person');
  if(!personItems.length) { showToast('Drop one person into the lead spot'); return; }
  const item = personItems[0];
  if(item.sourceJobId && item.sourceJobId !== jid) removeFromJob(item);
  // A lead is its own assignment, not duplicated in the crew list.
  target.people = (target.people || []).filter(p => p !== item.name);
  target.lead = item.name;
  target.leadPhone = PHONE_BY_PERSON[item.name] || target.leadPhone || '';
  selectedResources = selectedResources.filter(sel => !(sel.type===item.type && sel.name===item.name && (sel.sourceJobId||null)===(item.sourceJobId||null)));
  dragItems=[]; dragType=null;
  markJobEdited(jid, 'Job lead assigned');
  render();
}

function getScheduleSnapshot() {
  const snap = {};
  jobs.forEach(j => {
    if(!j.open) return;
    snap[j.id] = JSON.stringify({name:j.name,address:j.address,gc:j.gc,num:j.num,lead:j.lead,leadPhone:j.leadPhone,people:j.people,equip:j.equip});
  });

}
function isJobChangedSinceFinish(j) {
  if(!lastFinishedSnapshot) return false;
  return lastFinishedSnapshot[j.id] !== JSON.stringify({name:j.name,address:j.address,gc:j.gc,num:j.num,lead:j.lead,leadPhone:j.leadPhone,people:j.people,equip:j.equip});
}
function buildScheduleEmailBody(mode='final') {
  const openJobs = jobs.filter(j => j.open);
  const changedOnly = mode === 'update';
  let lines = [];
  lines.push(mode === 'update' ? 'UPDATED DAILY MANPOWER SCHEDULE' : 'DAILY MANPOWER SCHEDULE');
  lines.push('');
  openJobs.forEach(j => {
    const changed = isJobChangedSinceFinish(j);
    if(changedOnly && !changed) return;
    lines.push(`${changed ? '[UPDATED] ' : ''}${jobTitleLine(j)}`);
    if(j.lead) lines.push(`Lead: ${j.lead}${j.leadPhone ? ' - ' + j.leadPhone : ''}`);
    (j.people || []).filter(p => p !== j.lead).forEach(p => lines.push(p));
    (j.equip || []).forEach(e => lines.push(e));
    lines.push('');
  });
  if(changedOnly && lines.length <= 3) lines.push('No changes recorded since the last finished schedule.');
  return lines.join('\n');
}
function mailtoHref(mode='final') {
  const subject = mode === 'update' ? 'UPDATED Marschel Daily Manpower Schedule' : 'Marschel Daily Manpower Schedule';
  const recipients = EMAIL_RECIPIENTS.filter(Boolean).join(',');
  const body = buildScheduleEmailBody(mode);
  return `mailto:${encodeURIComponent(recipients)}?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`;
}

function handleJobAction(id, action) {
  if(!action) return;
  if(action === 'edit') return showEditModal(id);
  if(action === 'replace') return showReplaceModal(id);
  if(action === 'closeAll') return closeJobReturnAll(id);
  if(action === 'closeCrew') return closeJobReturnCrewOnly(id);
  if(action === 'reopen') return reopenJob(id);
  if(action === 'clone') return cloneJob(id);
  if(action === 'textLead') return showJobLeadText(id, 'Schedule update');
  if(action === 'delete') return deleteJob(id);
}

function closeJobReturnAll(id) {

function closeJobReturnCrewOnly(id) {

function reopenJob(id) {

function cloneJob(id) {
  const j = jobs.find(x=>x.id===id);
  if(!j) return;
  jobs.push({ id:nextId++, name:j.name + ' copy', address:j.address || '', gc:j.gc, num:j.num, open:true, lead:j.lead || '', leadPhone:j.leadPhone || '', people:[], equip:[] });
  render();
}


function removeFromJob(item) {
  if(!item || !item.sourceJobId) return false;
  const source = jobs.find(x=>x.id===item.sourceJobId);
  if(!source) return false;
  if(item.type === 'person') {
    source.people = source.people.filter(p=>p!==item.name);
    if(source.lead === item.name) { source.lead = ''; source.leadPhone = ''; }
  }
  else source.equip = source.equip.filter(eq=>eq!==item.name);
  source.lastEdited = new Date().toLocaleString();
  return true;
}

function returnSelectedToAvailable() {
  if(!selectedResources.length) { showToast('Select people or equipment first'); return; }
  let count = 0;
  selectedResources.forEach(item => { if(removeFromJob(item)) count++; });
  selectedResources = [];
  dragItems = [];
  dragType = null;
  render();
  showToast(count ? `Returned ${count} selected resource${count===1?'':'s'} to Available` : 'Selected resources are already available');
}

function onDropToAvailable(e) {
  e.preventDefault();
  e.currentTarget.classList.remove('drag-over');
  const items = dragItems.length ? dragItems : selectedResources;
  if(!items.length) { showToast('Select or drag resources first'); return; }
  let count = 0;
  items.forEach(item => { if(removeFromJob(item)) count++; });
  selectedResources = selectedResources.filter(sel => !items.some(d => d.type===sel.type && d.name===sel.name && (d.sourceJobId||null)===(sel.sourceJobId||null)));
  dragItems = [];
  dragType = null;
  render();
  showToast(count ? `Returned ${count} resource${count===1?'':'s'} to Available` : 'That resource is already available');
}

function removeResource(jid, type, name) {
  const j = jobs.find(x=>x.id===jid);
  if(!j) return;
  if(type==='person') {
    j.people = j.people.filter(p=>p!==name);
    if(j.lead === name) { j.lead = ''; j.leadPhone = ''; }
  }
  else j.equip = j.equip.filter(e=>e!==name);
  markJobEdited(jid, 'Resource removed');
  render();
}

function onDragStart(e, type, name, sourceJobId) {
  dragType = type;
  const matchingSelection = selectedResources.filter(r => r.type === type);
  const draggedIsSelected = matchingSelection.some(r => r.name === name && (r.sourceJobId || null) === (sourceJobId || null));
  dragItems = draggedIsSelected && matchingSelection.length ? matchingSelection : [{type, name, sourceJobId: sourceJobId || null}];
  e.dataTransfer.effectAllowed = 'move';
  e.dataTransfer.setData('text/plain', dragItems.map(x=>x.name).join(', '));
}
function onDragOver(e) {
  e.preventDefault();
  e.currentTarget.classList.add('drag-over');
}
function onDragLeave(e) {
  e.currentTarget.classList.remove('drag-over');
}
function onDrop(e, jid, zone) {
  e.preventDefault();
  e.currentTarget.classList.remove('drag-over');
  if(!dragItems.length) return;
  if(dragType !== zone) { showToast('Wrong zone — drop people into crew, equipment into equipment'); dragItems=[]; dragType=null; return; }
  const target = jobs.find(x=>x.id===jid);
  if(!target || !target.open) return;

  const moved = [];
  dragItems.filter(item => item.type === zone).forEach(item => {
    if(item.sourceJobId && item.sourceJobId !== jid) {
      removeFromJob(item);
    }
    if(zone==='person') {
      if(target.lead === item.name) {
        showToast(`${item.name} is already the lead for this job`);
      } else if(!target.people.includes(item.name)) target.people.push(item.name);
    } else {
      if(!target.equip.includes(item.name)) target.equip.push(item.name);
    }
    moved.push(item.name);
  });

  selectedResources = selectedResources.filter(sel => !dragItems.some(d => d.type===sel.type && d.name===sel.name && (d.sourceJobId||null)===(sel.sourceJobId||null)));
  dragItems=[]; dragType=null;
  if(moved.length) markJobEdited(jid, 'Resources assigned or moved');
  if(moved.length > 1) showToast(`Moved ${moved.length} resources`);
  render();
}

function showToast(msg) {

  t.style.cssText='position:absolute;top:8px;left:50%;transform:translateX(-50%);background:#FCEBEB;color:#791F1F;padding:6px 14px;border-radius:var(--border-radius-md);font-size:12px;z-index:99;border:0.5px solid #F7C1C1';
  document.body.appendChild(t);
  setTimeout(()=>t.remove(),2500);
}

<script>
async function uploadAccountingFile(){
  const input = document.getElementById('acctFileInput');
  const status = document.getElementById('acctImportStatus');
  if(!input.files || !input.files[0]){
    status.innerText = 'Choose the accounting Excel file first.';
    return;
  }

  const formData = new FormData();
  formData.append('file', input.files[0]);

  status.innerText = 'Importing...';

  try {
    const res = await fetch('/api/import-accounting-file', {
      method: 'POST',
      body: formData
    });

    const data = await res.json();

    if(!res.ok){
      status.innerText = 'Import failed: ' + (data.detail || res.statusText);
      return;
    }

    status.innerText =
      'Import Complete\n' +
      'Rows Read: ' + data.rows_read + '\n' +
      'New Jobs: ' + data.imported + '\n' +
      'Updated Jobs: ' + data.updated + '\n' +
      'Skipped: ' + data.skipped;

    if(typeof openJobBoard === 'function'){
      setTimeout(openJobBoard, 500);
    }
  } catch (err) {
    status.innerText = 'Import error: ' + err.message;
  }
}
</script>

<!-- MARSCHEL DATABASE JOB LIST BRIDGE START -->
<script>
let ARCHIVED_LIST = [];

function dbJobToUpcoming(j){
  return {
    name: j.job_name || '',
    num: j.job_number || '',
    customer: j.customer || '',
    gc: j.customer || '',
    pm: j.pm || '',
    address: [j.address || '', j.city || '', j.state_zip || ''].filter(Boolean).join(', '),
    startDate: j.start_date || '',
    dateEntered: j.date_entered || '',
    durationDays: j.duration_days || '',
    laborersNeeded: j.laborers_needed || '',
    operatorsNeeded: j.operators_needed || '',
    jobType: j.job_type || '',
    priority: j.priority || '',
    status: j.status || 'Active'
  };
}

async function loadDatabaseJobsToJobBoard(showMessage=true){
  try {
    const res = await fetch('/api/jobs');
    const data = await res.json();

    if(!res.ok || !data.ok){
      if(showMessage && typeof showToast === 'function') showToast('Could not load database jobs');
      return;
    }

    UPCOMING_LIST = (data.jobs || [])
      .filter(j => String(j.status || 'Active').toLowerCase() !== 'inactive')
      .map(dbJobToUpcoming);

    ARCHIVED_LIST = (data.jobs || [])
      .filter(j => String(j.status || '').toLowerCase() === 'inactive')
      .map(dbJobToUpcoming);

    if(typeof renderJobListTable === 'function') renderJobListTable();

    if(showMessage && typeof showToast === 'function'){
      showToast('Loaded ' + UPCOMING_LIST.length + ' active jobs from database');
    }
  } catch(err) {
    if(showMessage && typeof showToast === 'function') showToast('Database job load failed: ' + err.message);
  }
}

async function closeUpcomingJob(i){
  const job = UPCOMING_LIST[i];
  if(!job || !job.num){
    showToast('Cannot close job without a Job #');
    return;
  }

  if(!confirm('Close this job and move it to Archived Jobs?\n\n' + job.name + ' / ' + job.num)){
    return;
  }

  const res = await fetch('/api/jobs/' + encodeURIComponent(job.num) + '/inactive', { method: 'POST' });
  const data = await res.json();

  if(!res.ok || !data.ok){
    showToast('Could not close job');
    return;
  }

  UPCOMING_LIST.splice(i, 1);
  ARCHIVED_LIST.push(job);
  renderJobListTable();
  showToast('Job moved to Archived Jobs');
}

async function restoreArchivedJob(i){
  const job = ARCHIVED_LIST[i];
  if(!job || !job.num){
    showToast('Cannot restore job without a Job #');
    return;
  }

  const res = await fetch('/api/jobs/' + encodeURIComponent(job.num) + '/active', { method: 'POST' });
  const data = await res.json();

  if(!res.ok || !data.ok){
    showToast('Could not restore job');
    return;
  }

  ARCHIVED_LIST.splice(i, 1);
  UPCOMING_LIST.push(job);
  renderJobListTable();
  showToast('Job restored to active Job List');
}

function archivedJobsHtml(){
  if(!ARCHIVED_LIST || !ARCHIVED_LIST.length){
    return '<div class="pm-empty">No archived jobs.</div>';
  }

  return `<details class="pm-job-group">
    <summary><span>Archived Jobs</span><span class="pm-group-count">${ARCHIVED_LIST.length} job${ARCHIVED_LIST.length===1?'':'s'}</span></summary>
    <div class="pm-job-group-body">
      <div class="jobboard-row jobboard-head"><div>Forecast</div><div>Job Name</div><div>Job #</div><div>Customer</div><div>PM</div><div>Start</div><div>Entered</div><div>Duration M-F</div><div>Laborers</div><div>Operators</div><div>Address</div><div>Action</div></div>
      ${ARCHIVED_LIST.map((u,i)=>`<div class="jobboard-row">
        <div><span class="forecast-pill forecast-gray">ARCH</span></div>
        <div>${esc(u.name || '')}</div>
        <div>${esc(u.num || '')}</div>
        <div>${esc(u.customer || u.gc || '')}</div>
        <div>${esc(u.pm || '')}</div>
        <div>${esc(u.startDate || '')}</div>
        <div>${esc(u.dateEntered || '')}</div>
        <div>${esc(u.durationDays || '')}</div>
        <div>${esc(u.laborersNeeded || '')}</div>
        <div>${esc(u.operatorsNeeded || '')}</div>
        <div>${esc(u.address || '')}</div>
        <div><button class="btn btn-sm" onclick="restoreArchivedJob(${i})">Restore</button></div>
      </div>`).join('')}
    </div>
  </details>`;
}
</script>
